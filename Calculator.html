<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Basic Calculator Structure</title>
  </head>
  <body>
    <div class="calculator">
      <h1>My Simple Calculator</h1>
      <table border="1" cellpadding="10">
        <tr>
          <td colspan="4">
          <input type="text" id="display" placeholder="0" style="width:95%; height:30px; text-align:right;">
          </td>
        </tr>
        
        <tr>
          <td><button>C</button></td>
          <td><button>/</button></td>
          <td><button>*</button></td>
          <td><button>DEL</button></td>
        </tr>
        
        <tr>
          <td><button>7</button></td>
          <td><button>8</button></td>
          <td><button>9</button></td>
          <td><button>.</button></td>
        </tr>
        
        <tr>
          <td><button>4</button></td>
          <td><button>5</button></td>
          <td><button>6</button></td>
          <td><button>+</button></td>
        </tr>
        
         <tr>
          <td><button>1</button></td>
          <td><button>2</button></td>
          <td><button>3</button></td>
          <td rowspan="2"><button style="width:100%; height:100%;">=</button></td>
        </tr>
        
          <tr>
          <td colspan="2"><button style="width:100%;">0</button></td>
          <td><button>.</button></td>
        </tr>
      </table>
      
    </div>
  </body>
</html>
